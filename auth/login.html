<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SSC Prep Hub</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body data-auth-page="login">

  <main class="auth-shell">

    <!-- Brand -->
    <a class="auth-brand" href="../CORE/index.html" aria-label="SSC Prep Hub home">
      <span class="auth-brand-mark">S</span>
      <span class="auth-brand-text">
        <strong>SSC Prep Hub</strong>
        <small>Practice workspace</small>
      </span>
    </a>

    <!-- Card -->
    <div class="auth-card">

      <!-- Heading -->
      <div class="auth-heading">
        <p class="auth-eyebrow">Welcome back</p>
        <h1>Sign in to your account</h1>
        <p>Your progress, bookmarks, and revision queue are waiting.</p>
      </div>

      <!-- Status message -->
      <div id="authMessage" class="auth-message hidden" role="status" aria-live="polite"></div>

      <!-- Email + password form -->
      <form id="loginForm" class="auth-form" novalidate>

        <label class="field">
          <span>Email address</span>
          <input
            id="loginEmail"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          >
          <small id="loginEmailError" class="form-error"></small>
        </label>

        <label class="field">
          <span>Password</span>
          <div class="password-row">
            <input
              id="loginPassword"
              type="password"
              autocomplete="current-password"
              placeholder="Your password"
              required
            >
            <button
              class="ghost-icon toggle-password"
              type="button"
              data-target="loginPassword"
              aria-label="Toggle password visibility"
            >Show</button>
          </div>
          <small id="loginPasswordError" class="form-error"></small>
        </label>

        <button id="emailAuthBtn" class="auth-btn primary" type="submit">
          Sign in
        </button>

      </form>

      <!-- Divider -->
      <div class="auth-divider"><span>or</span></div>

      <!-- Google -->
      <button id="googleAuthBtn" class="auth-btn google" type="button">
        <span class="google-dot" aria-hidden="true"></span>
        Continue with Google
      </button>

      <!-- Switch -->
      <p class="auth-switch">
        No account yet? <a href="signup.html">Create one</a>
      </p>

    </div><!-- /auth-card -->

    <p class="auth-footer">SSC Prep Hub · Practice smarter, not harder.</p>

  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
