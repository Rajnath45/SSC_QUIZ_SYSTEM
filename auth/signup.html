<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — SSC Prep Hub</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body data-auth-page="signup">

  <main class="auth-shell">

    <!-- Brand -->
    <a class="auth-brand" href="../CORE/index.html" aria-label="SSC Prep Hub home">
      <span class="auth-brand-mark">S</span>
      <span class="auth-brand-text">
        <strong>SSC Prep Hub</strong>
        <small>Practice workspace</small>
      </span>
    </a>

    <!-- Card -->
    <div class="auth-card">

      <!-- Heading -->
      <div class="auth-heading">
        <p class="auth-eyebrow">Get started</p>
        <h1>Create your account</h1>
        <p>Track attempts, detect weak chapters, and build your revision queue.</p>
      </div>

      <!-- Status message -->
      <div id="authMessage" class="auth-message hidden" role="status" aria-live="polite"></div>

      <!-- Signup form -->
      <form id="signupForm" class="auth-form" novalidate>

        <label class="field">
          <span>Full name</span>
          <input
            id="signupName"
            type="text"
            autocomplete="name"
            placeholder="Your name"
            required
          >
          <small id="signupNameError" class="form-error"></small>
        </label>

        <label class="field">
          <span>Email address</span>
          <input
            id="signupEmail"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          >
          <small id="signupEmailError" class="form-error"></small>
        </label>

        <label class="field">
          <span>Password</span>
          <div class="password-row">
            <input
              id="signupPassword"
              type="password"
              autocomplete="new-password"
              placeholder="Minimum 8 characters"
              required
            >
            <button
              class="ghost-icon toggle-password"
              type="button"
              data-target="signupPassword"
              aria-label="Toggle password visibility"
            >Show</button>
          </div>
          <small id="signupPasswordError" class="form-error"></small>
        </label>

        <label class="field">
          <span>Confirm password</span>
          <div class="password-row">
            <input
              id="signupConfirmPassword"
              type="password"
              autocomplete="new-password"
              placeholder="Repeat password"
              required
            >
            <button
              class="ghost-icon toggle-password"
              type="button"
              data-target="signupConfirmPassword"
              aria-label="Toggle confirm password visibility"
            >Show</button>
          </div>
          <small id="signupConfirmPasswordError" class="form-error"></small>
        </label>

        <label class="terms-row">
          <input id="signupTerms" type="checkbox" required>
          <span>I agree to use SSC Prep Hub for practice tracking and revision planning.</span>
        </label>
        <small id="signupTermsError" class="form-error"></small>

        <button id="emailAuthBtn" class="auth-btn primary" type="submit">
          Create account
        </button>

      </form>

      <!-- Divider -->
      <div class="auth-divider"><span>or</span></div>

      <!-- Google -->
      <button id="googleAuthBtn" class="auth-btn google" type="button">
        <span class="google-dot" aria-hidden="true"></span>
        Continue with Google
      </button>

      <!-- Switch -->
      <p class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </p>

    </div><!-- /auth-card -->

    <p class="auth-footer">SSC Prep Hub · Practice smarter, not harder.</p>

  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
