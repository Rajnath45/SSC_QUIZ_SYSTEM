<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Records & Analytics | SSC Prep Hub</title>
  <link rel="stylesheet" href="dashboard.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════
       1. FONT OVERRIDE — strip Syne from all analytics elements;
          use DM Sans (same as index.html / style.css) throughout.
    ═══════════════════════════════════════════════════════════════ */
    .page-header-text h1,
    .perf-card-value,
    .weak-badge,
    .accuracy-pill,
    .all-clear-text strong,
    .empty-analytics h3,
    .history-chapter-name,
    .page-btn {
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif !important;
    }

    /* ═══════════════════════════════════════════════════════════════
       2. TOP NAVIGATION BAR
          Copied 1-to-1 from index.html / style.css class conventions.
          Prefixed with "dash-" so it never conflicts with dashboard.css.
    ═══════════════════════════════════════════════════════════════ */
    .dash-header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .dash-topbar {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      height: 64px;
    }

    /* Brand */
    .dash-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .dash-brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), #7C3AED);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 800;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(79,70,229,0.35);
    }

    .dash-brand strong {
      display: block;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
    }

    .dash-brand small {
      display: block;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      margin-top: 1px;
    }

    /* Nav links */
    .dash-nav-links {
      display: flex;
      justify-content: center;
      gap: 2px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .dash-nav-links a {
      display: inline-block;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      padding: 8px 14px;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .dash-nav-links a:hover,
    .dash-nav-links a.active {
      background: var(--primary-light);
      color: var(--primary);
    }

    /* Header controls */
    .dash-header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dash-auth-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dash-icon-btn {
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 800;
      padding: 0 14px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .dash-icon-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    /* Hamburger — mobile only */
    .dash-hamburger {
      display: none;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      justify-self: end;
    }

    .dash-hamburger span {
      width: 18px;
      height: 2px;
      border-radius: 9px;
      background: currentColor;
      display: block;
    }

    /* ═══════════════════════════════════════════════════════════════
       3. CONTAINER WIDTH
          Override dashboard.css's mobile-only 480px wrapper.
          Matches index.html's 1100px max-width exactly.
    ═══════════════════════════════════════════════════════════════ */
    body {
      display: block !important; /* undo the centred flex dashboard.css adds at 520px */
    }

    .dashboard-wrapper {
      width: 100% !important;
      max-width: 1100px !important;
      margin: 0 auto !important;
      padding: 32px 24px 48px !important;
    }

    /* ═══════════════════════════════════════════════════════════════
       4. BOTTOM NAV — visible on mobile, hidden on desktop (≥768px)
    ═══════════════════════════════════════════════════════════════ */
    @media (min-width: 768px) {
      .bottom-nav       { display: none !important; }
      .profile-dropdown { display: none !important; }
    }

    /* ── Mobile topbar — collapse links behind hamburger ────── */
    @media (max-width: 640px) {
      .dash-topbar {
        grid-template-columns: 1fr auto;
        height: auto;
        padding: 12px 16px;
      }

      .dash-hamburger { display: flex; }

      .dash-nav-links,
      .dash-header-controls {
        display: none;
        grid-column: 1 / -1;
        width: 100%;
      }

      .dash-nav-links.open {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding: 6px 0 10px;
        border-top: 1px solid var(--border);
        gap: 2px;
      }

      .dash-nav-links.open a { padding: 11px 8px; font-size: 15px; }

      .dash-header-controls.open {
        display: flex;
        flex-wrap: wrap;
        padding: 10px 0 12px;
        border-top: 1px solid var(--border);
        gap: 8px;
      }

      .dashboard-wrapper { padding: 20px 16px 100px !important; }
    }

    /* ═══════════════════════════════════════════════════════════════
       ANALYTICS PAGE STYLES
       (unchanged from v1, but Syne overridden above and spacing tuned)
    ═══════════════════════════════════════════════════════════════ */

    /* Page title row */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 28px;
    }

    .page-header-text h1 {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.15;
      color: var(--text);
    }

    .page-header-text p {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    /* On desktop give the clear button a label too */
    .clear-btn-label { display: none; }

    @media (min-width: 768px) {
      .clear-btn-label { display: inline; }
      #clearHistoryBtn {
        width: auto;
        border-radius: 8px;
        padding: 0 14px;
        font-size: 13px;
        font-weight: 800;
        gap: 8px;
      }
    }

    /* Section wrappers */
    .analytics-section { margin-bottom: 28px; }

    .section-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Performance stat cards */
    .perf-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .perf-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 24px 18px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .perf-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
    }

    .perf-card.card-primary::before { background: var(--primary); }
    .perf-card.card-success::before { background: var(--success); }

    .perf-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2px;
    }

    .perf-card-icon svg { width: 22px; height: 22px; }
    .perf-card-icon.icon-primary { background: var(--primary-light); color: var(--primary); }
    .perf-card-icon.icon-success { background: var(--success-light); color: var(--success); }

    .perf-card-value {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .perf-card-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Subject breakdown */
    .subject-breakdown {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 4px 18px;
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .breakdown-row:last-child { border-bottom: none; }

    .breakdown-subject {
      width: 80px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      flex-shrink: 0;
    }

    .breakdown-bar-wrap {
      flex: 1;
      height: 8px;
      border-radius: 99px;
      background: var(--border);
      overflow: hidden;
    }

    .breakdown-bar {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .breakdown-pct {
      font-size: 13px;
      font-weight: 800;
      min-width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    .bar-strong { background: var(--success); }
    .bar-ok     { background: var(--primary); }
    .bar-warn   { background: var(--warning); }
    .bar-danger { background: var(--danger);  }

    .pct-strong { color: var(--success); }
    .pct-ok     { color: var(--primary); }
    .pct-warn   { color: var(--warning); }
    .pct-danger { color: var(--danger);  }

    /* Weak Chapter Radar */
    .weak-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .weak-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .weak-item:last-child { border-bottom: none; }
    .weak-item:hover { background: var(--danger-light); }

    .weak-item-left { display: flex; align-items: center; gap: 12px; min-width: 0; }

    .weak-warn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
      box-shadow: 0 0 0 3px var(--danger-light);
    }

    .weak-item-text { min-width: 0; }

    .weak-chapter-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .weak-subject-tag {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
    }

    .weak-badge {
      font-size: 17px;
      font-weight: 800;
      color: var(--danger);
      flex-shrink: 0;
    }

    .weak-bar-mini {
      width: 52px;
      height: 5px;
      border-radius: 99px;
      background: var(--danger-light);
      overflow: hidden;
      flex-shrink: 0;
    }

    .weak-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--danger);
    }

    /* All-clear state */
    .all-clear {
      border: 1px solid var(--success);
      border-radius: var(--radius);
      background: var(--success-light);
      padding: 22px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .all-clear-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--success);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .all-clear-icon svg { width: 24px; height: 24px; }

    .all-clear-text strong {
      display: block;
      font-size: 15px;
      font-weight: 800;
      color: var(--success);
    }

    .all-clear-text p {
      margin-top: 3px;
      font-size: 13px;
      font-weight: 600;
      color: #065f46;
    }

    /* Empty state */
    .empty-analytics {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
    }

    .empty-analytics-icon { font-size: 40px; display: block; margin-bottom: 14px; }

    .empty-analytics h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-analytics p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      max-width: 280px;
      margin: 0 auto 20px;
      line-height: 1.6;
    }

    .start-quiz-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary);
      color: #fff;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      transition: background 0.15s;
    }

    .start-quiz-link:hover { background: #4338CA; }

    /* Quiz history log */
    .history-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .history-header-row {
      display: grid;
      grid-template-columns: 100px 1fr 80px;
      gap: 8px;
      padding: 10px 18px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .history-header-row span {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .history-header-row span:last-child { text-align: right; }

    .history-row {
      display: grid;
      grid-template-columns: 100px 1fr 80px;
      gap: 8px;
      align-items: center;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .history-row:last-child { border-bottom: none; }
    .history-row:hover { background: var(--primary-light); }

    .history-date {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.4;
    }

    .history-chapter { min-width: 0; }

    .history-chapter-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-subject-tag {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-top: 2px;
    }

    .history-accuracy { text-align: right; }

    .accuracy-pill {
      display: inline-block;
      font-size: 13px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 6px;
      min-width: 56px;
      text-align: center;
    }

    .acc-strong { background: var(--success-light); color: var(--success); }
    .acc-ok     { background: var(--primary-light); color: var(--primary); }
    .acc-warn   { background: var(--warning-light); color: #92400E; }
    .acc-danger { background: var(--danger-light);  color: var(--danger); }

    /* Pagination */
    .history-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .history-pagination > span {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .pagination-btns { display: flex; gap: 8px; }

    .page-btn {
      min-width: 36px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .page-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Animations */
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .perf-card-value { animation: countUp 0.5s ease both; }

    /* Toast */
    .toast-host {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 300;
      display: grid;
      gap: 8px;
    }

    .toast {
      width: min(320px, calc(100vw - 32px));
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--card);
      box-shadow: var(--shadow-md);
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
    }

    .toast.error   { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
    .toast.success { border-color: var(--success); color: var(--success); background: var(--success-light); }
  </style>
</head>
<body>
  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <!-- ══════════════════════════════════════════════════════════
       TOP NAVIGATION — exact structure from index.html
  ══════════════════════════════════════════════════════════ -->
  <header class="dash-header">
    <nav class="dash-topbar" aria-label="Primary navigation">

      <a class="dash-brand" href="../CORE/index.html" aria-label="SSC Prep Hub home">
        <span class="dash-brand-mark" aria-hidden="true">S</span>
        <span>
          <strong>SSC PREP HUB</strong>
          <small>Practice workspace</small>
        </span>
      </a>

      <!-- Hamburger visible only on mobile -->
      <button id="dashHamburger" class="dash-hamburger" type="button"
              aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="dash-nav-links" id="dashNavLinks" role="list">
        <li><a href="../CORE/index.html">Home</a></li>
        <li><a href="../CORE/index.html#subjectGrid">Subjects</a></li>
        <li><a href="../CORE/index.html#chapters">Chapters</a></li>
        <li><a href="dashboard.html" class="active" aria-current="page">Dashboard</a></li>
      </ul>

      <div class="dash-header-controls" id="dashHeaderControls">
        <span id="topbarUsername" class="dash-auth-status">…</span>
        <button id="topbarLogoutBtn" class="dash-icon-btn" type="button">Logout</button>
      </div>

    </nav>
  </header>

  <!-- ══════════════════════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════════════════════ -->
  <main class="dashboard-wrapper">

    <!-- Page title row -->
    <header class="page-header">
      <div class="page-header-text">
        <h1>Records &amp; Analytics</h1>
        <p id="todayDate">Loading…</p>
      </div>
      <button class="bell-btn" type="button" id="clearHistoryBtn"
              title="Clear all quiz history" aria-label="Clear all quiz history">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
        <span class="clear-btn-label">Clear History</span>
      </button>
    </header>

    <!-- Section 1: Performance Overview -->
    <section class="analytics-section" aria-labelledby="perfLabel">
      <p class="section-label" id="perfLabel">Performance Overview</p>
      <div class="perf-grid">
        <div class="perf-card card-primary">
          <div class="perf-card-icon icon-primary">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <span class="perf-card-value" id="statTotalQuizzes">—</span>
          <span class="perf-card-label">Total Quizzes Attempted</span>
        </div>
        <div class="perf-card card-success">
          <div class="perf-card-icon icon-success">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
          <span class="perf-card-value" id="statLifetimeAcc">—</span>
          <span class="perf-card-label">Lifetime Accuracy</span>
        </div>
      </div>
    </section>

    <!-- Subject Accuracy Breakdown -->
    <section class="analytics-section" id="subjectBreakdownSection" aria-labelledby="breakdownLabel">
      <p class="section-label" id="breakdownLabel">Subject Accuracy</p>
      <div class="subject-breakdown" id="subjectBreakdown"></div>
    </section>

    <!-- Section 2: Weak Chapter Radar -->
    <section class="analytics-section" aria-labelledby="weakLabel">
      <p class="section-label" id="weakLabel">Weak Chapter Radar</p>
      <div id="weakChapterContainer"></div>
    </section>

    <!-- Section 3: Quiz History Log -->
    <section class="analytics-section" aria-labelledby="historyLabel">
      <p class="section-label" id="historyLabel">Quiz History</p>
      <div id="historyContainer"></div>
