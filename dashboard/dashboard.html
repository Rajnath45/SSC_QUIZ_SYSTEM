<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | SSC Prep Hub</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <main class="dashboard-wrapper">
    <header class="home-header">
      <div>
        <h1>Hello, <span id="firstName">Aspirant</span> <span aria-hidden="true">👋</span></h1>
        <p id="todayDate">Monday, 18 May 2026</p>
      </div>
      <button class="bell-btn" type="button" aria-label="Notifications">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.268 21a2 2 0 0 0 3.464 0"/>
          <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8a6 6 0 0 0-12 0c0 4.499-1.411 5.956-2.738 7.326"/>
        </svg>
      </button>
    </header>

    <section class="streak-card" aria-labelledby="streakTitle">
      <div class="streak-title">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 17c1.5 0 3-1 3-3.5 0-2-1-3-1-5 2.5 1.5 4 4 4 7a5 5 0 0 1-10 0c0-1.153.433-2.294 1.5-3z"/>
          <path d="M12 2c1.5 2 2 4 2 6 0 1.5-.5 3-2 4"/>
        </svg>
        <h2 id="streakTitle"><span id="streakCount">0</span> Day Streak</h2>
      </div>
      <div class="week-row" id="weekRow"></div>
    </section>

    <section class="stats-row" aria-label="Quiz stats">
      <article class="stat-chip">
        <strong id="totalQuizzes">0</strong>
        <span>Quizzes</span>
      </article>
      <article class="stat-chip">
        <strong id="totalQuestions">0</strong>
        <span>Questions</span>
      </article>
      <article class="stat-chip">
        <strong id="accuracy">0%</strong>
        <span>Accuracy</span>
      </article>
    </section>

    <section id="continueCard" class="continue-card hidden"></section>

    <section class="subject-grid" aria-label="Subjects">
      <a class="subject-card subject-geography" href="../CORE/index.html?subject=geography">
        <span class="subject-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
            <path d="M2 12h20"/>
          </svg>
        </span>
        <strong>Geography</strong>
      </a>
      <a class="subject-card subject-history" href="../CORE/index.html?subject=history">
        <span class="subject-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" x2="21" y1="22" y2="22"/>
            <line x1="6" x2="6" y1="18" y2="11"/>
            <line x1="10" x2="10" y1="18" y2="11"/>
            <line x1="14" x2="14" y1="18" y2="11"/>
            <line x1="18" x2="18" y1="18" y2="11"/>
            <polygon points="12 2 20 7 4 7"/>
          </svg>
        </span>
        <strong>History</strong>
      </a>
      <a class="subject-card subject-polity" href="../CORE/index.html?subject=polity">
        <span class="subject-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/>
            <path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/>
            <path d="M7 21h10"/>
            <path d="M12 3v18"/>
            <path d="M3 7h2c2 0 5-1 7-4 2 3 5 4 7 4h2"/>
          </svg>
        </span>
        <strong>Polity</strong>
      </a>
      <a class="subject-card subject-science" href="../CORE/index.html?subject=science">
        <span class="subject-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 2v7.31"/>
            <path d="M14 9.3V2"/>
            <path d="M8.5 2h7"/>
            <path d="M14 9.3a6.5 6.5 0 1 1-4 0"/>
            <path d="M5.52 16h12.96"/>
          </svg>
        </span>
        <strong>Science</strong>
      </a>
    </section>

    <section id="revisionDueCard" class="revision-due-card hidden"></section>
  </main>

  <nav class="bottom-nav" aria-label="Dashboard navigation">
    <a href="dashboard.html" class="nav-item active">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </a>
    <a href="../CORE/index.html" class="nav-item">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 7v14"/>
        <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>
      </svg>
      <span>Practice</span>
    </a>
    <button class="nav-item" id="profileTab" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </button>
  </nav>

  <div class="profile-dropdown hidden" id="profileDropdown">
    <p class="profile-name" id="profileName">Aspirant</p>
    <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
