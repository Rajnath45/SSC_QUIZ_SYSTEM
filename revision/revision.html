<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Spaced-repetition revision for SSC CGL / CHSL preparation.">
  <meta name="theme-color" content="#4F46E5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>Revision | SSC Prep Hub</title>

  <!--
    ⚠️  PATH NOTE
    style.css lives one folder above this file if your layout is:
      /practice/style.css
      /revision/revision.html
    → use  href="../style.css"
    
    If style.css and revision.html share the same folder:
    → use  href="style.css"
    
    Adjust the path below to match your project structure.
  -->
  <link rel="stylesheet" href="../style.css">

  <!-- Revision-specific additions only — thin layer on top of style.css -->
  <link rel="stylesheet" href="revision.css">
</head>

<!--
  body.revision-active tells revision.css to:
  • strip inherited body padding-bottom (quiz-active adds it on the main page)
  • hide any leaked quiz chrome (bottom nav, palette fab, etc.)
-->
<body class="revision-active">

  <main class="revision-wrapper" role="main" aria-label="Revision session">
    <section
      id="revisionApp"
      class="revision-card"
      aria-live="polite"
      aria-atomic="true"
    >
      <!-- Loading placeholder — revision.js replaces this on first render -->
      <div class="state-screen" id="loadingState" aria-label="Loading">
        <span class="state-icon" aria-hidden="true">⏳</span>
        <h1>Loading…</h1>
        <p>Fetching your due cards.</p>
      </div>
    </section>
  </main>

  <noscript>
    <style>
      #loadingState { display: none; }
      .noscript-msg { font-family: sans-serif; text-align: center; padding: 40px 20px; color: #1E1B4B; }
    </style>
    <div class="noscript-msg">
      <strong>JavaScript is required</strong> to run the revision session.
      Please enable JS in your browser and reload the page.
    </div>
  </noscript>

  <script src="revision.js" defer></script>

</body>
</html>
